<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} ?: 'Neocare'">Neocare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- NAVBAR -->
<nav th:fragment="navbar" class="navbar">
    <div class="navbar-container">
        <a th:href="@{/dashboard}" class="navbar-brand">
            <span class="brand-icon">♥</span> Neocare
        </a>

        <div sec:authorize="isAuthenticated()" class="navbar-links">
            <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
            <a th:href="@{/medicoes-web}" class="nav-link">Medições</a>
            <a th:href="@{/alertas-web}" class="nav-link">Alertas</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/usuarios}" class="nav-link">Usuários</a>
            <span class="nav-user">
                <span sec:authentication="name">usuário</span>
            </span>
            <form th:action="@{/auth/logout}" method="post" class="nav-logout-form">
                <button type="submit" class="btn btn-sm btn-outline">Sair</button>
            </form>
        </div>
    </div>
</nav>

<!-- FOOTER -->
<footer th:fragment="footer" class="footer">
    <p>&copy; 2026 Neocare — Sistema de Monitoramento de Estresse</p>
</footer>

</body>
</html>
