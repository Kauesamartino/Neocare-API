<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Cadastro — Neocare')}"></head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <span class="brand-icon-lg">♥</span>
            <h1>Criar Conta</h1>
            <p>Preencha os dados para se cadastrar no Neocare</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <form th:action="@{/auth/registro}" th:object="${registroForm}" method="post" class="auth-form">

            <!-- Dados Pessoais -->
            <fieldset>
                <legend>Dados Pessoais</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" th:field="*{nome}"
                               th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="Seu nome">
                        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label for="sobrenome">Sobrenome</label>
                        <input type="text" id="sobrenome" th:field="*{sobrenome}"
                               th:classappend="${#fields.hasErrors('sobrenome')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="Seu sobrenome">
                        <span th:if="${#fields.hasErrors('sobrenome')}" th:errors="*{sobrenome}" class="error-msg"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" th:field="*{cpf}"
                               th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="11 dígitos" maxlength="11">
                        <span th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="email@exemplo.com">
                        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-msg"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" th:field="*{telefone}" class="form-control" placeholder="Telefone">
                        <span th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label for="dataNascimento">Data de Nascimento</label>
                        <input type="date" id="dataNascimento" th:field="*{dataNascimento}"
                               th:classappend="${#fields.hasErrors('dataNascimento')} ? 'is-invalid' : ''"
                               class="form-control">
                        <span th:if="${#fields.hasErrors('dataNascimento')}" th:errors="*{dataNascimento}" class="error-msg"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="sexo">Sexo</label>
                        <select id="sexo" th:field="*{sexo}"
                                th:classappend="${#fields.hasErrors('sexo')} ? 'is-invalid' : ''"
                                class="form-control">
                            <option value="">Selecione...</option>
                            <option th:each="s : ${T(com.neocare.api.domain.enums.Sexo).values()}"
                                    th:value="${s}" th:text="${s}">
                            </option>
                        </select>
                        <span th:if="${#fields.hasErrors('sexo')}" th:errors="*{sexo}" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label for="altura">Altura (cm)</label>
                        <input type="number" id="altura" th:field="*{altura}"
                               th:classappend="${#fields.hasErrors('altura')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="170" min="50" max="300">
                        <span th:if="${#fields.hasErrors('altura')}" th:errors="*{altura}" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label for="peso">Peso (kg)</label>
                        <input type="number" id="peso" th:field="*{peso}"
                               th:classappend="${#fields.hasErrors('peso')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="70.0" step="0.1" min="10" max="500">
                        <span th:if="${#fields.hasErrors('peso')}" th:errors="*{peso}" class="error-msg"></span>
                    </div>
                </div>
            </fieldset>

            <!-- Endereço -->
            <fieldset>
                <legend>Endereço</legend>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label for="logradouro">Logradouro</label>
                        <input type="text" id="logradouro" th:field="*{logradouro}"
                               th:classappend="${#fields.hasErrors('logradouro')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="Rua, Avenida...">
                        <span th:if="${#fields.hasErrors('logradouro')}" th:errors="*{logradouro}" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" th:field="*{numero}"
                               th:classappend="${#fields.hasErrors('numero')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="100">
                        <span th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}" class="error-msg"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento" th:field="*{complemento}"
                               class="form-control" placeholder="Apto, Bloco...">
                    </div>
                    <div class="form-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" th:field="*{bairro}"
                               th:classappend="${#fields.hasErrors('bairro')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="Centro">
                        <span th:if="${#fields.hasErrors('bairro')}" th:errors="*{bairro}" class="error-msg"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" th:field="*{cep}"
                               th:classappend="${#fields.hasErrors('cep')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="01234-567" maxlength="9">
                        <span th:if="${#fields.hasErrors('cep')}" th:errors="*{cep}" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" th:field="*{cidade}"
                               th:classappend="${#fields.hasErrors('cidade')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="São Paulo">
                        <span th:if="${#fields.hasErrors('cidade')}" th:errors="*{cidade}" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label for="uf">UF</label>
                        <input type="text" id="uf" th:field="*{uf}"
                               th:classappend="${#fields.hasErrors('uf')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="SP" maxlength="2">
                        <span th:if="${#fields.hasErrors('uf')}" th:errors="*{uf}" class="error-msg"></span>
                    </div>
                </div>
            </fieldset>

            <!-- Credenciais -->
            <fieldset>
                <legend>Credenciais de Acesso</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" th:field="*{username}"
                               th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="Escolha um nome de usuário">
                        <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" th:field="*{password}"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                               class="form-control" placeholder="Mínimo 6 caracteres">
                        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-msg"></span>
                    </div>
                </div>
            </fieldset>

            <button type="submit" class="btn btn-primary btn-block">Cadastrar</button>
        </form>

        <div class="auth-footer">
            <p>Já tem conta? <a th:href="@{/auth/login}">Faça login</a></p>
        </div>
    </div>
</div>

</body>
</html>
