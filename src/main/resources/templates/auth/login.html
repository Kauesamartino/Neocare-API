<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Login — Neocare')}"></head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="brand-icon-lg">♥</span>
            <h1>Neocare</h1>
            <p>Sistema de Monitoramento de Estresse</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            Usuário ou senha inválidos.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            Você saiu com sucesso.
        </div>
        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

        <form th:action="@{/auth/login}" method="post" class="auth-form">

            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username"
                       placeholder="Digite seu usuário"
                       required autofocus class="form-control">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password"
                       placeholder="Digite sua senha"
                       required class="form-control">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>

        <div class="auth-footer">
            <p>Não tem conta? <a th:href="@{/auth/registro}">Cadastre-se</a></p>
        </div>
    </div>
</div>

</body>
</html>
