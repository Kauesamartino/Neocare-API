name: Trigger auto deployment for neocare-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/neocare-api-AutoDeployTrigger-9ca68d4a-595d-4b61-81a6-a435662d2bd0.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.NEOCAREAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.NEOCAREAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.NEOCAREAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}src/main/docker
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: neocareapi.azurecr.io
          registryUsername: ${{ secrets.NEOCAREAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.NEOCAREAPI_REGISTRY_PASSWORD }}
          containerAppName: neocare-api
          resourceGroup: neocare
          imageToBuild: neocareapi.azurecr.io/neocare-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


